apiVersion: v1
kind: ServiceAccount
metadata:
  name: todoapp-sa
  namespace: todoapp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-reader-role
  namespace: todoapp
rules:
- apiGroups: [""] # Порожні лапки означають core API group (сюди входять Secrets, Pods, ConfigMaps)
  resources: ["secrets"]
  verbs: ["list", "get"] # Тобі потрібен list, але get зазвичай додають, щоб можна було прочитати вміст конкретного секрету
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: todoapp-rb
  namespace: todoapp
subjects:
- kind: ServiceAccount
  name: todoapp-sa
  namespace: todoapp
roleRef:
  kind: Role
  name: secret-reader-role
  apiGroup: rbac.authorization.k8s.io
